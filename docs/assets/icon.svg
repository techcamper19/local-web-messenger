<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Local Web Messenger icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- chat bubble -->
  <path d="M128 140h256a40 40 0 0 1 40 40v132a40 40 0 0 1-40 40H236l-72 60v-60h-36a40 40 0 0 1-40-40V180a40 40 0 0 1 40-40z" fill="#2563eb"/>
  <!-- two dots = two devices talking -->
  <circle cx="212" cy="246" r="22" fill="#e2e8f0"/>
  <circle cx="300" cy="246" r="22" fill="#e2e8f0"/>
  <!-- small "LAN" link line under the dots -->
  <rect x="206" y="296" width="100" height="14" rx="7" fill="#22c55e"/>
</svg>
