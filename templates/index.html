<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Web Messenger</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <h1>Local Web Messenger</h1>
            <div class="status">
                <span id="status-dot" class="dot"></span>
                <span id="status-text">Connecting…</span>
            </div>
        </header>

        <div class="name-row">
            <label for="name-input">Your name</label>
            <input id="name-input" type="text" placeholder="Type your name" maxlength="40">
        </div>

        <main id="messages" class="messages"></main>

        <form id="send-form" class="composer" autocomplete="off">
            <input id="message-input" type="text" placeholder="Type a message…" maxlength="2000">
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
